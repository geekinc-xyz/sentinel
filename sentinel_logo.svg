  <circle cx="82" cy="105" r="2.5" fill="#4a9eff" opacity="0.5" style="fill:rgb(74, 158, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="92" cy="105" r="2.5" fill="#4a9eff" opacity="0.3" style="fill:rgb(74, 158, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="248" cy="105" r="2.5" fill="#4a9eff" opacity="0.5" style="fill:rgb(74, 158, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="258" cy="105" r="2.5" fill="#4a9eff" opacity="0.3" style="fill:rgb(74, 158, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Vertical separator -->
  <line x1="328" y1="50" x2="328" y2="300" stroke="#4a9eff" stroke-width="0.8" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(74, 158, 255);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- SENTINEL horizontal text -->
  <text x="358" y="168" font-family="monospace" font-size="52" font-weight="700" fill="#4a9eff" letter-spacing="4" style="fill:rgb(74, 158, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">SENTINEL</text>

  <!-- Subtitle -->
  <text x="360" y="200" font-family="monospace" font-size="13" font-weight="400" fill="#4a9eff" opacity="0.5" letter-spacing="3" style="fill:rgb(74, 158, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">DNS THREAT INTELLIGENCE</text>
</svg>