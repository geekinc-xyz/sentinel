  <line x1="180" y1="168" x2="220" y2="168" stroke="#4a9eff" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(74, 158, 255);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="115" y1="182" x2="158" y2="182" stroke="#4a9eff" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(74, 158, 255);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
