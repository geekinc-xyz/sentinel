  <polyline points="78,223 90,223 96,209 104,237 112,215 120,230 128,223 138,223 146,213 154,233 162,223 178,223 186,213 194,233 202,223 212,223 220,217 228,229 236,223 250,223 258,223 262,223" fill="none" stroke="#4a9eff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" style="fill:none;stroke:rgb(74, 158, 255);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:round;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

